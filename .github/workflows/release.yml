name: Release

on:
  push:
    tags:
      - 'better_auth-v*'
      - 'better_auth-rails-v*'
      - 'better_auth-sinatra-v*'
      - 'better_auth-hanami-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate release without publishing"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BETTER_AUTH_POSTGRES_URL: postgres://user:password@localhost:5432/better_auth
  BETTER_AUTH_MYSQL_HOST: 127.0.0.1
  BETTER_AUTH_MYSQL_PORT: 3306
  BETTER_AUTH_MYSQL_USER: user
  BETTER_AUTH_MYSQL_PASSWORD: password
  BETTER_AUTH_MYSQL_DATABASE: better_auth

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      core_version: ${{ steps.detect.outputs.core_version }}
      rails_version: ${{ steps.detect.outputs.rails_version }}
      sinatra_version: ${{ steps.detect.outputs.sinatra_version }}
      hanami_version: ${{ steps.detect.outputs.hanami_version }}
      tag_version: ${{ steps.detect.outputs.tag_version }}
      target_package: ${{ steps.detect.outputs.target_package }}
      core_releases: ${{ steps.detect.outputs.core_releases }}
      rails_releases: ${{ steps.detect.outputs.rails_releases }}
      sinatra_releases: ${{ steps.detect.outputs.sinatra_releases }}
      hanami_releases: ${{ steps.detect.outputs.hanami_releases }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
      dry_run: ${{ steps.detect.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release package
        id: detect
        env:
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          core_file="packages/better_auth/lib/better_auth/version.rb"
          rails_file="packages/better_auth-rails/lib/better_auth/rails/version.rb"
          sinatra_file="packages/better_auth-sinatra/lib/better_auth/sinatra/version.rb"
          hanami_file="packages/better_auth-hanami/lib/better_auth/hanami/version.rb"

          core_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$core_file")
          rails_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$rails_file")
          sinatra_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$sinatra_file")
          hanami_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$hanami_file")

          tag_name=""
          tag_version=""
          target_package=""
          core_releases=false
          rails_releases=false
          sinatra_releases=false
          hanami_releases=false
          should_publish=false

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag_name="${GITHUB_REF_NAME}"

            case "$tag_name" in
              better_auth-v*)
                target_package="better_auth"
                tag_version="${tag_name#better_auth-v}"
                expected_version="$core_version"
                core_releases=true
                ;;
              better_auth-rails-v*)
                target_package="better_auth-rails"
                tag_version="${tag_name#better_auth-rails-v}"
                expected_version="$rails_version"
                rails_releases=true
                ;;
              better_auth-sinatra-v*)
                target_package="better_auth-sinatra"
                tag_version="${tag_name#better_auth-sinatra-v}"
                expected_version="$sinatra_version"
                sinatra_releases=true
                ;;
              better_auth-hanami-v*)
                target_package="better_auth-hanami"
                tag_version="${tag_name#better_auth-hanami-v}"
                expected_version="$hanami_version"
                hanami_releases=true
                ;;
              *)
                echo "::error ::Release tags must use a package prefix: better_auth-vX.Y.Z, better_auth-rails-vX.Y.Z, better_auth-sinatra-vX.Y.Z, or better_auth-hanami-vX.Y.Z."
                exit 1
                ;;
            esac

            if [ -z "$tag_version" ]; then
              echo "::error ::Tag ${tag_name} is missing a version suffix."
              exit 1
            fi

            if [ "$expected_version" != "$tag_version" ]; then
              echo "::error ::Tag ${tag_name} targets ${target_package} ${tag_version}, but the package version is ${expected_version}."
              exit 1
            fi

            git fetch origin '+refs/heads/*:refs/remotes/origin/*'
            containing_branches=$(git branch -r --contains "$GITHUB_SHA" | sed 's/^[[:space:]]*//' || true)
            is_prerelease=false
            if [[ "$tag_version" =~ [a-zA-Z] ]]; then
              is_prerelease=true
            fi

            branch_allowed=false
            while IFS= read -r branch; do
              if [ "$is_prerelease" = "true" ]; then
                if [[ "$branch" == "origin/canary" || "$branch" == "origin/main" || "$branch" =~ ^origin/v[0-9]+\.[0-9]+\.x$ ]]; then
                  branch_allowed=true
                fi
              else
                if [[ "$branch" == "origin/main" || "$branch" =~ ^origin/v[0-9]+\.[0-9]+\.x$ ]]; then
                  branch_allowed=true
                fi
              fi
            done <<< "$containing_branches"

            if [ "$branch_allowed" != "true" ]; then
              echo "::error ::Release tag ${tag_name} is not on an allowed release branch."
              echo "Stable tags must be contained in main or a vX.Y.x maintenance branch."
              echo "Prerelease tags may also be contained in canary."
              echo "Containing branches:"
              echo "$containing_branches"
              exit 1
            fi

            should_publish=true
          fi

          echo "core_version=$core_version" >> "$GITHUB_OUTPUT"
          echo "rails_version=$rails_version" >> "$GITHUB_OUTPUT"
          echo "sinatra_version=$sinatra_version" >> "$GITHUB_OUTPUT"
          echo "hanami_version=$hanami_version" >> "$GITHUB_OUTPUT"
          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "target_package=$target_package" >> "$GITHUB_OUTPUT"
          echo "core_releases=$core_releases" >> "$GITHUB_OUTPUT"
          echo "rails_releases=$rails_releases" >> "$GITHUB_OUTPUT"
          echo "sinatra_releases=$sinatra_releases" >> "$GITHUB_OUTPUT"
          echo "hanami_releases=$hanami_releases" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN_INPUT" >> "$GITHUB_OUTPUT"

          echo "core_version=$core_version"
          echo "rails_version=$rails_version"
          echo "sinatra_version=$sinatra_version"
          echo "hanami_version=$hanami_version"
          echo "tag_version=${tag_version:-manual-dry-run}"
          echo "target_package=${target_package:-manual-dry-run}"
          echo "core_releases=$core_releases"
          echo "rails_releases=$rails_releases"
          echo "sinatra_releases=$sinatra_releases"
          echo "hanami_releases=$hanami_releases"
          echo "should_publish=$should_publish"
          echo "dry_run=$DRY_RUN_INPUT"

  test-core:
    name: Test better_auth (Core)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.core_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth

      - name: Run linter
        working-directory: packages/better_auth
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth
        run: bundle exec rake test

  test-rails:
    name: Test better_auth-rails (Rails Adapter)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.rails_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-rails

      - name: Run linter
        working-directory: packages/better_auth-rails
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-rails
        run: bundle exec rspec

  test-sinatra:
    name: Test better_auth-sinatra (Sinatra Adapter)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.sinatra_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-sinatra

      - name: Run linter
        working-directory: packages/better_auth-sinatra
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-sinatra
        run: bundle exec rspec

  test-hanami:
    name: Test better_auth-hanami (Hanami Adapter)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.hanami_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-hanami

      - name: Run linter
        working-directory: packages/better_auth-hanami
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-hanami
        run: bundle exec rspec

  publish-core:
    name: Build and publish better_auth
    needs: [prepare-release, test-core]
    if: needs.prepare-release.outputs.core_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth

      - name: Configure RubyGems credentials
        if: needs.prepare-release.outputs.core_releases == 'true' && needs.prepare-release.outputs.dry_run != 'true'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build better_auth gem
        working-directory: packages/better_auth
        run: |
          set -euo pipefail
          rm -f better_auth-*.gem
          gem build better_auth.gemspec

      - name: Publish better_auth gem
        if: needs.prepare-release.outputs.core_releases == 'true'
        working-directory: packages/better_auth
        env:
          TARGET_VERSION: ${{ needs.prepare-release.outputs.core_version }}
          DRY_RUN: ${{ needs.prepare-release.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled, skipping gem push for better_auth"
            exit 0
          fi

          already_exists=$(ruby -rjson -ropen-uri -e 'gem_name = "better_auth"; version = ENV.fetch("TARGET_VERSION"); begin; body = URI.open("https://rubygems.org/api/v1/versions/#{gem_name}.json").read; versions = JSON.parse(body).map { |v| v["number"] }; print versions.include?(version) ? "true" : "false"; rescue StandardError; print "false"; end')

          if [ "$already_exists" = "true" ]; then
            echo "better_auth $TARGET_VERSION already exists on RubyGems, skipping push"
            exit 0
          fi

          gem push better_auth-*.gem

  publish-rails:
    name: Build and publish better_auth-rails
    needs: [prepare-release, test-rails]
    if: needs.prepare-release.outputs.rails_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-rails

      - name: Configure RubyGems credentials
        if: needs.prepare-release.outputs.rails_releases == 'true' && needs.prepare-release.outputs.dry_run != 'true'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build better_auth-rails gems
        working-directory: packages/better_auth-rails
        run: |
          set -euo pipefail
          rm -f better_auth-rails-*.gem better_auth_rails-*.gem
          gem build better_auth-rails.gemspec
          gem build better_auth_rails.gemspec

      - name: Publish better_auth-rails gem
        if: needs.prepare-release.outputs.rails_releases == 'true'
        working-directory: packages/better_auth-rails
        env:
          TARGET_VERSION: ${{ needs.prepare-release.outputs.rails_version }}
          DRY_RUN: ${{ needs.prepare-release.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled, skipping gem push for better_auth-rails"
            exit 0
          fi

          already_exists=$(ruby -rjson -ropen-uri -e 'gem_name = "better_auth-rails"; version = ENV.fetch("TARGET_VERSION"); begin; body = URI.open("https://rubygems.org/api/v1/versions/#{gem_name}.json").read; versions = JSON.parse(body).map { |v| v["number"] }; print versions.include?(version) ? "true" : "false"; rescue StandardError; print "false"; end')

          if [ "$already_exists" = "true" ]; then
            echo "better_auth-rails $TARGET_VERSION already exists on RubyGems, skipping push"
            exit 0
          fi

          gem push better_auth-rails-*.gem

      - name: Publish better_auth_rails gem
        if: needs.prepare-release.outputs.rails_releases == 'true'
        working-directory: packages/better_auth-rails
        env:
          TARGET_VERSION: ${{ needs.prepare-release.outputs.rails_version }}
          DRY_RUN: ${{ needs.prepare-release.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled, skipping gem push for better_auth_rails"
            exit 0
          fi

          already_exists=$(ruby -rjson -ropen-uri -e 'gem_name = "better_auth_rails"; version = ENV.fetch("TARGET_VERSION"); begin; body = URI.open("https://rubygems.org/api/v1/versions/#{gem_name}.json").read; versions = JSON.parse(body).map { |v| v["number"] }; print versions.include?(version) ? "true" : "false"; rescue StandardError; print "false"; end')

          if [ "$already_exists" = "true" ]; then
            echo "better_auth_rails $TARGET_VERSION already exists on RubyGems, skipping push"
            exit 0
          fi

          gem push better_auth_rails-*.gem

  publish-sinatra:
    name: Build and publish better_auth-sinatra
    needs: [prepare-release, test-sinatra]
    if: needs.prepare-release.outputs.sinatra_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-sinatra

      - name: Configure RubyGems credentials
        if: needs.prepare-release.outputs.sinatra_releases == 'true' && needs.prepare-release.outputs.dry_run != 'true'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build better_auth-sinatra gem
        working-directory: packages/better_auth-sinatra
        run: |
          set -euo pipefail
          rm -f better_auth-sinatra-*.gem
          gem build better_auth-sinatra.gemspec

      - name: Publish better_auth-sinatra gem
        if: needs.prepare-release.outputs.sinatra_releases == 'true'
        working-directory: packages/better_auth-sinatra
        env:
          TARGET_VERSION: ${{ needs.prepare-release.outputs.sinatra_version }}
          DRY_RUN: ${{ needs.prepare-release.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled, skipping gem push for better_auth-sinatra"
            exit 0
          fi

          already_exists=$(ruby -rjson -ropen-uri -e 'gem_name = "better_auth-sinatra"; version = ENV.fetch("TARGET_VERSION"); begin; body = URI.open("https://rubygems.org/api/v1/versions/#{gem_name}.json").read; versions = JSON.parse(body).map { |v| v["number"] }; print versions.include?(version) ? "true" : "false"; rescue StandardError; print "false"; end')

          if [ "$already_exists" = "true" ]; then
            echo "better_auth-sinatra $TARGET_VERSION already exists on RubyGems, skipping push"
            exit 0
          fi

          gem push better_auth-sinatra-*.gem

  publish-hanami:
    name: Build and publish better_auth-hanami
    needs: [prepare-release, test-hanami]
    if: needs.prepare-release.outputs.hanami_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-hanami

      - name: Configure RubyGems credentials
        if: needs.prepare-release.outputs.hanami_releases == 'true' && needs.prepare-release.outputs.dry_run != 'true'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build better_auth-hanami gem
        working-directory: packages/better_auth-hanami
        run: |
          set -euo pipefail
          rm -f better_auth-hanami-*.gem
          gem build better_auth-hanami.gemspec

      - name: Publish better_auth-hanami gem
        if: needs.prepare-release.outputs.hanami_releases == 'true'
        working-directory: packages/better_auth-hanami
        env:
          TARGET_VERSION: ${{ needs.prepare-release.outputs.hanami_version }}
          DRY_RUN: ${{ needs.prepare-release.outputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled, skipping gem push for better_auth-hanami"
            exit 0
          fi

          already_exists=$(ruby -rjson -ropen-uri -e 'gem_name = "better_auth-hanami"; version = ENV.fetch("TARGET_VERSION"); begin; body = URI.open("https://rubygems.org/api/v1/versions/#{gem_name}.json").read; versions = JSON.parse(body).map { |v| v["number"] }; print versions.include?(version) ? "true" : "false"; rescue StandardError; print "false"; end')

          if [ "$already_exists" = "true" ]; then
            echo "better_auth-hanami $TARGET_VERSION already exists on RubyGems, skipping push"
            exit 0
          fi

          gem push better_auth-hanami-*.gem

  create-release:
    name: Create GitHub release
    needs: [prepare-release, publish-core, publish-rails, publish-sinatra, publish-hanami]
    if: |
      always() &&
      needs.prepare-release.outputs.should_publish == 'true' &&
      needs.prepare-release.outputs.dry_run != 'true' &&
      (
        needs.publish-core.result == 'success' ||
        needs.publish-rails.result == 'success' ||
        needs.publish-sinatra.result == 'success' ||
        needs.publish-hanami.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          name: "Better Auth Ruby ${{ github.ref_name }}"
          body: |
            ## Published packages

            - `better_auth` version `${{ needs.prepare-release.outputs.core_version }}` (released: `${{ needs.prepare-release.outputs.core_releases }}`)
            - `better_auth-rails` version `${{ needs.prepare-release.outputs.rails_version }}` (released: `${{ needs.prepare-release.outputs.rails_releases }}`)
            - `better_auth_rails` version `${{ needs.prepare-release.outputs.rails_version }}` (released: `${{ needs.prepare-release.outputs.rails_releases }}`)
            - `better_auth-sinatra` version `${{ needs.prepare-release.outputs.sinatra_version }}` (released: `${{ needs.prepare-release.outputs.sinatra_releases }}`)
            - `better_auth-hanami` version `${{ needs.prepare-release.outputs.hanami_version }}` (released: `${{ needs.prepare-release.outputs.hanami_releases }}`)
