name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Test jobs - must pass before release
  test-core:
    name: Test better_auth (Core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        working-directory: packages/better_auth
        run: bundle install

      - name: Run linter
        working-directory: packages/better_auth
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth
        run: bundle exec rake test

  test-rails:
    name: Test better_auth-rails (Rails Adapter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        working-directory: packages/better_auth-rails
        run: bundle install

      - name: Run linter
        working-directory: packages/better_auth-rails
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-rails
        run: bundle exec rspec

  # Release jobs - only run if tests pass
  release-core:
    name: Release better_auth to RubyGems
    needs: [test-core]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        working-directory: packages/better_auth
        run: bundle install

      - name: Build and Publish to RubyGems
        working-directory: packages/better_auth
        run: |
          mkdir -p $HOME/.gem
          touch $HOME/.gem/credentials
          chmod 0600 $HOME/.gem/credentials
          printf -- "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}\n" > $HOME/.gem/credentials
          gem build better_auth.gemspec
          gem push better_auth-*.gem
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_API_KEY }}"

  release-rails:
    name: Release better_auth-rails to RubyGems
    needs: [test-rails]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        working-directory: packages/better_auth-rails
        run: bundle install

      - name: Build and Publish to RubyGems
        working-directory: packages/better_auth-rails
        run: |
          mkdir -p $HOME/.gem
          touch $HOME/.gem/credentials
          chmod 0600 $HOME/.gem/credentials
          printf -- "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}\n" > $HOME/.gem/credentials
          gem build better_auth-rails.gemspec
          gem push better_auth-rails-*.gem
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_API_KEY }}"

  # Create GitHub Release only if both gems published successfully
  create-release:
    name: Create GitHub Release
    needs: [release-core, release-rails]
    runs-on: ubuntu-latest
    if: needs.release-core.result == 'success' && needs.release-rails.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          name: "Better Auth Ruby ${{ github.ref_name }}"
          body: |
            ## Changes
            
            This release includes updates to the Better Auth Ruby gems.
            
            ### Packages
            - `better_auth` - Core authentication library
            - `better_auth-rails` - Rails adapter
            
            ${{ github.event.head_commit.message }}
