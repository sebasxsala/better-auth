name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/**'
      - 'Gemfile'
      - 'Rakefile'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  push:
    branches:
      - main
      - canary
    paths:
      - 'packages/**'
      - 'Gemfile'
      - 'Rakefile'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BETTER_AUTH_POSTGRES_URL: postgres://user:password@localhost:5432/better_auth
  BETTER_AUTH_MYSQL_HOST: 127.0.0.1
  BETTER_AUTH_MYSQL_PORT: 3306
  BETTER_AUTH_MYSQL_USER: user
  BETTER_AUTH_MYSQL_PASSWORD: password
  BETTER_AUTH_MYSQL_DATABASE: better_auth

jobs:
  test-core:
    name: Test better_auth (Core)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth

      - name: Run linter
        working-directory: packages/better_auth
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth
        run: bundle exec rake test

  test-rails:
    name: Test better_auth-rails (Rails Adapter)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-rails

      - name: Run linter
        working-directory: packages/better_auth-rails
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-rails
        run: bundle exec rspec

  test-sinatra:
    name: Test better_auth-sinatra (Sinatra Adapter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-sinatra

      - name: Run linter
        working-directory: packages/better_auth-sinatra
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-sinatra
        run: bundle exec rspec
